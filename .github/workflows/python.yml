
name: Python CI

on:
  push:
    branches:
      - master

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Script
        run: python guessTheNumber.py

      - name: CD Step (Deploy Simulation)
          run: |
            echo "🚀 Triggering Auto Deploy..."
            curl -X POST "https://www.pythonanywhere.com/api/v0/user/${{ secrets.USERNAME }}/consoles/" -H "Authorization: Token ${{ secrets.API_TOKEN }}"